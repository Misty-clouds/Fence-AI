name: fence_ai
description: "A new Flutter project."

publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  lottie: ^3.3.1
  shared_preferences: ^2.5.3
  http: ^1.4.0
  supabase_flutter: ^2.9.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.2.1
  cupertino_icons: ^1.0.8
  image_picker: ^1.0.4
  file_picker: ^8.0.0+1
  app_links: ^6.3.2
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  flutter_markdown: ^0.7.4+1

  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lotties/
    - assets/icons/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/fence.ai_app_icon.png"
  adaptive_icon_background: "#5B8C7A"
  adaptive_icon_foreground: "assets/images/fence.ai_app_icon.png"

  